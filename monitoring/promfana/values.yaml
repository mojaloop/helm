# -----------------------------------------------------------------------------
# Default values for promfana.
# This is a YAML-formatted file.
# -----------------------------------------------------------------------------
# Goals of this chart:
# - Keep defaults minimal
# - Keep Grafana dashboards packaged as part of the Helm release
# - Preserve Grafana folders
# - Avoid hardcoding the namespace
# - Allow users to override everything for production
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# kube-prometheus-stack values
# -----------------------------------------------------------------------------
kps:

  # -----------------------------------------------------------------------------
  # Install CRDs required by the Prometheus Operator stack
  # -----------------------------------------------------------------------------
  crds:
    enabled: true

  # -----------------------------------------------------------------------------
  # Grafana
  # -----------------------------------------------------------------------------
  grafana:
    enabled: true

    # Administrator credentials when not using an external secret manager.
    # This chart is wired to use the secret named below.
    adminUser: admin
    adminPassword:

    # Use an existing secret for the admin user.
    # existingSecret only when you want an external secret.
    admin:
      existingSecret: ""
      userKey: admin-user
      passwordKey: admin-password

    # -----------------------------------------------------------------------------
    # Expose Grafana
    # -----------------------------------------------------------------------------
    # Disabled by default to keep the install minimal.
    # For local access, use kubectl port-forward (documented in README).
    ingress:
      enabled: false
      ingressClassName: nginx
      hosts:
        - grafana.mojaloop.local
      tls: []
      # Example:
      # tls:
      #   - secretName: grafana-tls
      #     hosts:
      #       - grafana.mojaloop.local

    # -----------------------------------------------------------------------------
    # Grafana server settings
    # -----------------------------------------------------------------------------
    grafana.ini:
      server:
        # Change this when ingress is enabled
        root_url: https://grafana.mojaloop.local
      security:
        # Change to true when serving Grafana over HTTPS
        cookie_secure: false
      auth.anonymous:
        enabled: false
      users:
        viewers_can_edit: false

    # -----------------------------------------------------------------------------
    # Persistence
    # -----------------------------------------------------------------------------
    # Disabled by default to keep the setup lightweight.
    persistence:
      enabled: false
      type: pvc
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      size: 10Gi

    # -----------------------------------------------------------------------------
    # Resources
    # -----------------------------------------------------------------------------
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits: {}

    # -----------------------------------------------------------------------------
    # Sidecar: dashboards
    # -----------------------------------------------------------------------------
    sidecar:
      skipTlsVerify: true # To skip the Tls Verification when communicating with kubernetes
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL
        resource: configmap
        folder: /tmp/dashboards
        folderAnnotation: grafana_folder
        provider:
          allowUiUpdates: true
          foldersFromFilesStructure: true
      datasources:
        enabled: false

    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: sidecarProvider
            orgId: 1
            folder: ""
            type: file
            disableDeletion: false
            editable: true
            allowUiUpdates: true
            options:
              path: /tmp/dashboards

    # -----------------------------------------------------------------------------
    # Datasource configmap
    # -----------------------------------------------------------------------------

    extraConfigmapMounts:
      - name: grafana-datasource
        configMap: grafana-datasource # The configmap name is hard-coded
        mountPath: /etc/grafana/provisioning/datasources/prometheus.yaml
        subPath: prometheus.yaml
        readOnly: true
  # -----------------------------------------------------------------------------
  # Prometheus
  # -----------------------------------------------------------------------------
  prometheus:
    enabled: true
    prometheusSpec:
      # Keep defaults small and easy to override
      retention: 7d
      retentionSize: ""
      walCompression: true

      # Allow discovery of ServiceMonitors/PodMonitors/Rules outside Helm-owned ones
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      serviceMonitorNamespaceSelector: {}
      podMonitorNamespaceSelector: {}

      # Empty by default. Add storageSpec for persistent production setups.
      storageSpec: {}

      resources:
        requests:
          cpu: 500m
          memory: 2Gi
        limits: {}

  # -----------------------------------------------------------------------------
  # Alertmanager
  # -----------------------------------------------------------------------------
  alertmanager:
    # Disabled by default. Enable only when you want alert handling.
    enabled: false

    alertmanagerSpec:
      replicas: 1

      # Empty by default. Add storage for persistent production setups.
      storage: {}

      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits: {}

    # Notification routing is intentionally empty/minimal by default.
    # Users can override this section with Slack/email/webhook receivers.
    config: {}

  # -----------------------------------------------------------------------------
  # Exporters / Operator
  # -----------------------------------------------------------------------------
  kubeStateMetrics:
    enabled: true

  prometheus-node-exporter:
    enabled: true

  prometheusOperator:
    enabled: true

# -----------------------------------------------------------------------------
# Grafana admin secret managed by this chart
# -----------------------------------------------------------------------------
grafanaAdminSecret:
  # Create a secret for Grafana admin credentials as part of the Helm release.
  enabled: true

  # Secret name.
  # IMPORTANT:
  # - If you change this, also change:
  #   kps.grafana.admin.existingSecret
  name: ""

  # Keys stored inside the secret
  userKey: admin-user
  passwordKey: admin-password

  # Credentials written to the secret
  username: admin
  password: 

# -----------------------------------------------------------------------------
# Prometheus datasource ConfigMap managed by this chart
# -----------------------------------------------------------------------------
prometheusDatasource:
  enabled: true

  # Datasource name as it should appear in Grafana
  name: Prometheus
  uid: prometheus

  # The Prometheus service URL is rendered dynamically using the install namespace.
  # By default this chart points Grafana at the operator-managed service:
  #   http://prometheus-operated.<namespace>.svc:9090
  #
  # Override serviceName if your environment uses a different service.
  serviceName: prometheus-operated
  servicePort: 9090
  isDefault: true

# -----------------------------------------------------------------------------
# Dashboard packaging
# -----------------------------------------------------------------------------
# These values are used by the custom dashboard ConfigMap template in this chart.
# JSON dashboards should be placed under:
#   dashboards/application/
#   dashboards/datastore/
#   dashboards/messaging/
#   dashboards/kubernetes/
# -----------------------------------------------------------------------------
dashboards:
  enabled: true

  # Folder names as they should appear in Grafana
  folderNames:
    application: "Mojaloop - Application"
    datastore: "Mojaloop - Datastore"
    messaging: "Mojaloop - Messaging"
    kubernetes: "Mojaloop - Kubernetes"

  # Enable / disable dashboard groups
  folders:
    application:
      enabled: true
    datastore:
      enabled: true
    messaging:
      enabled: true
    kubernetes:
      enabled: true

# -----------------------------------------------------------------------------
# Service Monitors
# -----------------------------------------------------------------------------
serviceMonitors:
  enabled: true
  defaults:
    targetNamespace: mojaloop
    path: /metrics
    interval: 15s
    port: http

  items:
    - name: mojaloop-all
      selector:
        matchLabels:
          app.kubernetes.io/instance: moja

# -----------------------------------------------------------------------------
# Kafka Exporter
# -----------------------------------------------------------------------------
kafka-exporter:
  enabled: true

  # Bootstrap broker(s) from Bitnami Kafka
  kafkaServer:
    ## You can use below default value
    - "kafka.mojaloop.svc.cluster.local:9092"
  fullnameOverride: kafka-exporter

  service:
    type: ClusterIP
    port: 9308

  prometheus:
    serviceMonitor:
      enabled: true
      namespace: mojaloop
      interval: 30s