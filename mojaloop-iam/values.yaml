oathkeeper:
  enabled: true
  global:
    ory:
      oathkeeper:
        maester:
          mode: controller
  replicaCount: 1
  fullnameOverride: "oathkeeper"
  oathkeeper:
    config:
      log:
        level: info
        format: json
      access_rules:
        matching_strategy: regexp
      authenticators:
        jwt:
          enabled: true
          config:
            jwks_urls:
              - http://hydra-public/.well-known/jwks.json
            target_audience:
              - connection-manager-api
            # Hydra generates its JWT signing keysets lazily on first use;
            # 5s covers the cold keygen and only ever applies once.
            jwks_max_wait: 5s
        cookie_session:
          enabled: true
          config:
            check_session_url: http://kratos-public/sessions/whoami
            preserve_path: true
            preserve_query: true
            extra_from: "@this"
            subject_from: identity.id
            only:
              - ory_kratos_session
        anonymous:
          enabled: true
          config:
            subject: guest
      authorizers:
        allow:
          enabled: true
        keto_engine_acp_ory:
          enabled: true
          config:
            base_url: "http://keto-read"
            required_action: "read"
            required_resource: "unknown"
            flavor: "regex"
        remote_json:
          enabled: true
          config:
            remote: http://keto-read/relation-tuples/check
            payload: |
              {
                "subject": "{{ print .Subject }}",
                "resource": "{{ printIndex .MatchContext.RegexpCaptureGroups 0 }}"
              }
      mutators:
        id_token:
          enabled: true
          config:
            issuer_url: http://oathkeeper-api:4456/
            jwks_url: http://oathkeeper:4456/.well-known/jwks.json
        header:
          enabled: true
          config:
            headers:
              X-User: '{{ print .Subject }}'
              X-Email: '{{ with .Extra.identity }}{{ print .traits.email }}{{ end }}'
              X-DFSP-ID: '{{ with .Extra.identity }}{{ with .metadata_public }}{{ with .dfspId }}{{ . }}{{ end }}{{ end }}{{ end }}'
              X-Roles: '[{{ if .Extra.identity }}{{ with .Extra.identity.metadata_public }}{{ with .role }}"{{ . }}"{{ end }}{{ with .dfspId }}"dfsp:{{ . }}"{{ end }}{{ end }}{{ else }}"dfsp:{{ print .Subject }}"{{ end }}]'
        noop:
          enabled: true
      errors:
        fallback:
          - json
        handlers:
          json:
            enabled: true
            config:
              verbose: true
          redirect:
            enabled: false
            config:
              to: ""
              when:
                - error: [unauthorized, forbidden]
                  request:
                    header:
                      accept: [text/html]
      serve:
        proxy:
          port: 4455
        api:
          port: 4456
    mutatorIdTokenJWKs: {}
    managedAccessRules: false
  maester:
    enabled: true
    oathkeeperFullnameOverride: 'oathkeeper'
  oathkeeper-maester:
    fullnameOverride: 'oathkeeper-maester'
    oathkeeperFullnameOverride: 'oathkeeper'
    deployment:
      envs:
        - name: authorizersAvailable
          value: allow,deny,noop,remote_json,keto_engine_acp_ory
  serviceMonitor:
    scheme: http
    scrapeInterval: 60s
    scrapeTimeout: 30s

keto:
  enabled: true
  replicaCount: 1
  secret:
    enabled: false
    nameOverride: keto-secret
  service:
    metrics:
      enabled: true
      type: ClusterIP
      loadBalancerIP: ""
      name: http-metrics
      port: 80
      annotations: {}
  keto:
    command: ["keto"]
    automigration:
      enabled: true
      type: initContainer
    config:
      serve:
        read:
          port: 4466
        write:
          port: 4467
        metrics:
          port: 4468
      namespaces:
        location: file:///etc/keto-namespaces
  # OPL namespace files ship inside service Docker images and are mounted
  # via K8s ImageVolume + subPath. Each contributing service adds:
  #   extraVolumes:
  #     - name: <svc>-opl
  #       image: { reference: <org>/<svc>:<tag> }
  #   extraVolumeMounts:
  #     - name: <svc>-opl
  #       mountPath: /etc/keto-namespaces/<svc>.ts
  #       subPath: <path/to/svc>.keto.ts
  # Keto loads all .ts files from /etc/keto-namespaces at startup.
  deployment:
    extraVolumes: []
    extraVolumeMounts: []
  serviceMonitor:
    scheme: http
    scrapeInterval: 60s
    scrapeTimeout: 30s

kratos:
  enabled: true
  replicaCount: 1
  fullnameOverride: "kratos"
  secret:
    enabled: false
    nameOverride: kratos-secret
  courier:
    enabled: true
  deployment:
    extraVolumes:
      - name: courier-templates-recovery-valid
        configMap:
          name: kratos-courier-recovery-valid
    extraVolumeMounts:
      - name: courier-templates-recovery-valid
        mountPath: /conf/courier-templates/recovery/valid
        readOnly: true
  kratos:
    development: false
    automigration:
      enabled: true
      type: initContainer
    identitySchemas:
      "identity.default.schema.json": |
        {
          "$id": "https://mojaloop.io/kratos-schema/identity.schema.json",
          "$schema": "http://json-schema.org/draft-07/schema#",
          "title": "Person",
          "type": "object",
          "properties": {
            "traits": {
              "type": "object",
              "properties": {
                "email": {
                  "title": "E-Mail",
                  "type": "string",
                  "format": "email",
                  "minLength": 3,
                  "ory.sh/kratos": {
                    "credentials": {
                      "password": { "identifier": true },
                      "code": { "identifier": true, "via": "email" }
                    },
                    "recovery": { "via": "email" },
                    "verification": { "via": "email" }
                  }
                },
                "name": {
                  "title": "Name",
                  "type": "string"
                },
                "roles": {
                  "title": "User Roles",
                  "type": "array",
                  "items": {
                    "type": "string"
                  }
                }
              },
              "required": ["email"],
              "additionalProperties": false
            }
          }
        }
      "role-injection-body.jsonnet": |
        function(ctx) {
          identity_id: ctx.identity.id,
          user_subject: ctx.identity.traits.subject
        }
    config:
      identity:
        default_schema_id: default
        schemas:
          - id: default
            url: file:///etc/config/identity.default.schema.json
      serve:
        public:
          base_url: https://localhost/kratos/
          port: 4433
          cors:
            enabled: true
            allowed_origins:
              - https://*.localhost
        admin:
          port: 4434
      selfservice:
        default_browser_return_url: https://localhost/ui/welcome
        allowed_return_urls:
          - https://*.localhost
        methods:
          password:
            enabled: true
          code:
            enabled: true
            config:
              lifespan: 168h
          link:
            enabled: true
            config:
              lifespan: 168h
          oidc:
            enabled: true
          profile:
            enabled: false
        flows:
          login:
            ui_url: https://localhost/ui/login
            lifespan: 10m
            after:
              oidc:
                default_browser_return_url: https://localhost/ui/welcome
                hooks:
                  - hook: web_hook
                    config:
                      url: http://ml-iam-services-kratos-role-webhook/inject-roles
                      method: POST
                      body: file:///etc/config/role-injection-body.jsonnet
                      response:
                        parse: false
                      auth:
                        type: api_key
                        config:
                          name: Authorization
                          value: Bearer kratos-webhook-token
                          in: header
          logout:
            after:
              default_browser_return_url: https://localhost/realms/hub-operators/protocol/openid-connect/logout
          error:
            ui_url: https://localhost/ui/error
          registration:
            after:
              oidc:
                hooks:
                  - hook: web_hook
                    config:
                      url: http://ml-iam-services-kratos-role-webhook/inject-roles
                      method: POST
                      body: file:///etc/config/role-injection-body.jsonnet
                      response:
                        parse: false
                      auth:
                        type: api_key
                        config:
                          name: Authorization
                          value: Bearer kratos-webhook-token
                          in: header
                  - hook: session
      log:
        level: info
        format: json
      ciphers:
        algorithm: xchacha20-poly1305
      hashers:
        algorithm: bcrypt
        bcrypt:
          cost: 8
      session:
        cookie:
          domain: localhost
      courier:
        template_override_path: /conf/courier-templates
        smtp:
          connection_uri: smtp://mailpit:1025/?disable_starttls=true
          from_address: noreply@mojaloop.local
          from_name: Mojaloop MCM
  serviceMonitor:
    enabled: true
    scheme: http
    scrapeInterval: 60s
    scrapeTimeout: 30s

hydra:
  enabled: true
  secret:
    enabled: false
    nameOverride: hydra-secret
  hydra:
    automigration:
      enabled: true
      type: initContainer
    config:
      serve:
        cookies:
          same_site_mode: Lax
        public:
          cors:
            enabled: true
            allowed_origins:
              - "*"
      strategies:
        access_token: jwt
      oidc:
        subject_identifiers:
          supported_types:
            - public
      ttl:
        access_token: 1h
        id_token: 1h
        refresh_token: 720h
        auth_code: 10m
      log:
        level: info
        format: json

ml-iam-services:
  ketoBatchAuth:
    env:
      KETO_READ_URL: "http://keto-read"
  kratosRoleWebhook:
    env:
      KRATOS_ADMIN_URL: "http://kratos-admin"
      KETO_READ_URL: "http://keto-read"

# Helm hook that seeds the initial hub-admin: a Kratos identity (password
# credential) and the Hub:<ketoHubObject>#admins Keto tuple. Opt-in; production
# deployments typically bootstrap admins via SSO and leave this disabled.
#
# Admin password source:
#   - If adminPasswordSecret is set, the password is read from that Secret.
#   - Otherwise, the chart generates a random password on first install,
#     persists it in Secret 'iam-bootstrap-admin-password' (kept across helm
#     uninstall), and reuses it on subsequent upgrades.
iamBootstrap:
  enabled: false
  image: python:3.14-alpine
  kratosAdminUrl: http://kratos-admin
  ketoWriteUrl: http://keto-write
  adminEmail: admin@mcm.local
  adminPasswordSecret: ""
  adminPasswordSecretKey: password
  hubAdminRole: hub-admin
  ketoHubObject: mojaloop

# Kratos self-service UI: login, recovery, settings, error pages.
kratosUI:
  enabled: false

# Mailpit SMTP catcher for dev/CI. Acts as the Kratos courier backend so
# invitation and recovery emails can be inspected via Mailpit's web UI.
mailpit:
  enabled: false

# Bundled PostgreSQL — when enabled, the chart provisions a Postgres instance
# with three databases (hydra, kratos, keto) on first install, materialises
# 'ml-iam-postgresql-credentials' with an autogenerated superuser password,
# and synthesises hydra-secret/kratos-secret/keto-secret with DSNs pointing
# at it. Disable to bring an external Postgres; in that case the three Ory
# Secrets must be supplied externally before installing.
postgresql:
  enabled: true
  fullnameOverride: ml-iam-postgresql
  auth:
    existingSecret: ml-iam-postgresql-credentials
    secretKeys:
      adminPasswordKey: postgres-password
  primary:
    initdb:
      scriptsConfigMap: ml-iam-postgresql-initdb
