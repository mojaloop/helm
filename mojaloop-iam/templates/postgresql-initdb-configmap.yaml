{{- if .Values.postgresql.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: ml-iam-postgresql-initdb
  namespace: {{ .Release.Namespace }}
data:
  # bitnami/postgresql runs every *.sql in /docker-entrypoint-initdb.d on
  # first cluster bootstrap (skipped on subsequent restarts).
  001-iam-databases.sql: |
    CREATE DATABASE hydra;
    CREATE DATABASE kratos;
    CREATE DATABASE keto;
{{- end }}
