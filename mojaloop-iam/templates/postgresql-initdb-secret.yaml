{{- if .Values.postgresql.enabled -}}
{{- /*
  bitnami/postgresql runs every *.sql in /docker-entrypoint-initdb.d on
  first cluster bootstrap (skipped on subsequent restarts). The SQL
  embeds per-service passwords so it lives in a Secret, not a ConfigMap.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: ml-iam-postgresql-initdb
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  001-iam-databases.sql: |
    CREATE USER hydra WITH PASSWORD '{{ include "iam.derivedPassword" (dict "ctx" . "purpose" "hydra") }}';
    CREATE DATABASE hydra OWNER hydra;
    CREATE USER kratos WITH PASSWORD '{{ include "iam.derivedPassword" (dict "ctx" . "purpose" "kratos") }}';
    CREATE DATABASE kratos OWNER kratos;
    CREATE USER keto WITH PASSWORD '{{ include "iam.derivedPassword" (dict "ctx" . "purpose" "keto") }}';
    CREATE DATABASE keto OWNER keto;
{{- end }}
