{{- if .Values.postgresql.enabled -}}
{{- /*
  hydra-secret, kratos-secret, keto-secret with per-service DSNs
  (own user, own database) plus the random Ory secret material
  (system/cookie/cipher) and kratos courier SMTP URI.

  Lookup-and-keep pattern: the random Ory secrets are persisted
  via resource-policy: keep so they don't rotate behind running
  pods on chart upgrades.

  postgresql.enabled=false: operator supplies these Secrets externally.
*/}}
{{- $pgHost := "ml-iam-postgresql" -}}
{{- $dsnArgs := "?sslmode=disable&max_conns=20&max_idle_conns=4" -}}
{{- $hydraPassword := include "iam.derivedPassword" (dict "ctx" . "purpose" "hydra") -}}
{{- $kratosPassword := include "iam.derivedPassword" (dict "ctx" . "purpose" "kratos") -}}
{{- $ketoPassword := include "iam.derivedPassword" (dict "ctx" . "purpose" "keto") -}}

{{- $hydra := lookup "v1" "Secret" .Release.Namespace "hydra-secret" -}}
{{- $hydraSystem := randAlphaNum 32 -}}
{{- if and $hydra $hydra.data (hasKey $hydra.data "secretsSystem") }}
{{- $hydraSystem = index $hydra.data "secretsSystem" | b64dec -}}
{{- end }}
{{- $hydraCookie := randAlphaNum 32 -}}
{{- if and $hydra $hydra.data (hasKey $hydra.data "secretsCookie") }}
{{- $hydraCookie = index $hydra.data "secretsCookie" | b64dec -}}
{{- end }}

{{- $kratos := lookup "v1" "Secret" .Release.Namespace "kratos-secret" -}}
{{- $kratosDefault := randAlphaNum 32 -}}
{{- if and $kratos $kratos.data (hasKey $kratos.data "secretsDefault") }}
{{- $kratosDefault = index $kratos.data "secretsDefault" | b64dec -}}
{{- end }}
{{- $kratosCookie := randAlphaNum 32 -}}
{{- if and $kratos $kratos.data (hasKey $kratos.data "secretsCookie") }}
{{- $kratosCookie = index $kratos.data "secretsCookie" | b64dec -}}
{{- end }}
{{- $kratosCipher := randAlphaNum 32 -}}
{{- if and $kratos $kratos.data (hasKey $kratos.data "secretsCipher") }}
{{- $kratosCipher = index $kratos.data "secretsCipher" | b64dec -}}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: hydra-secret
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  dsn: "postgres://hydra:{{ $hydraPassword }}@{{ $pgHost }}:5432/hydra{{ $dsnArgs }}"
  secretsSystem: {{ $hydraSystem | quote }}
  secretsCookie: {{ $hydraCookie | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: kratos-secret
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  dsn: "postgres://kratos:{{ $kratosPassword }}@{{ $pgHost }}:5432/kratos{{ $dsnArgs }}"
  secretsDefault: {{ $kratosDefault | quote }}
  secretsCookie: {{ $kratosCookie | quote }}
  secretsCipher: {{ $kratosCipher | quote }}
  smtpConnectionURI: {{ .Values.kratos.kratos.config.courier.smtp.connection_uri | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: keto-secret
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  dsn: "postgres://keto:{{ $ketoPassword }}@{{ $pgHost }}:5432/keto{{ $dsnArgs }}"
{{- end }}
