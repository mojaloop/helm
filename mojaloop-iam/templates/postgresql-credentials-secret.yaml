{{- if .Values.postgresql.enabled -}}
{{- /*
  postgres superuser password: autogenerated on first install, persisted in
  Secret 'ml-iam-postgresql-credentials' (kept across helm uninstall), and
  reused on subsequent upgrades. Bitnami postgresql consumes it via
  auth.existingSecret + auth.secretKeys.adminPasswordKey.
*/}}
{{- $name := "ml-iam-postgresql-credentials" -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- $password := "" -}}
{{- if and $existing $existing.data (index $existing.data "postgres-password") -}}
{{- $password = index $existing.data "postgres-password" | b64dec -}}
{{- else -}}
{{- $password = randAlphaNum 24 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  postgres-password: {{ $password | quote }}
{{- end }}
