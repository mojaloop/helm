{{- if .Values.postgresql.enabled -}}
{{- /*
  postgres superuser password: generated by the iam.postgresPassword
  helper (shared with ory-database-secrets so both templates emit the
  same value in one render), persisted in Secret
  'ml-iam-postgresql-credentials' (kept across helm uninstall), and
  reused on subsequent upgrades. Bitnami postgresql consumes it via
  auth.existingSecret + auth.secretKeys.adminPasswordKey.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: ml-iam-postgresql-credentials
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  postgres-password: {{ include "iam.postgresPassword" . | quote }}
{{- end }}
