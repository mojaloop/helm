{{- if .Values.postgresql.enabled -}}
{{- /*
  Source of truth for every credential the IAM stack uses:
    postgres-password — bitnami postgresql superuser (auth.existingSecret)
    hydra-password    — hydra DB user, owns 'hydra' database
    kratos-password   — kratos DB user, owns 'kratos' database
    keto-password     — keto DB user, owns 'keto' database
  Persisted via resource-policy: keep so credentials stay stable across
  helm uninstall. Bitnami consumes 'postgres-password' via
  auth.existingSecret + auth.secretKeys.adminPasswordKey; the per-service
  entries are read back by other templates via the iam.derivedPassword
  helper.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: ml-iam-postgresql-credentials
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  postgres-password: {{ include "iam.derivedPassword" (dict "ctx" . "purpose" "postgres") | quote }}
  hydra-password: {{ include "iam.derivedPassword" (dict "ctx" . "purpose" "hydra") | quote }}
  kratos-password: {{ include "iam.derivedPassword" (dict "ctx" . "purpose" "kratos") | quote }}
  keto-password: {{ include "iam.derivedPassword" (dict "ctx" . "purpose" "keto") | quote }}
{{- end }}
