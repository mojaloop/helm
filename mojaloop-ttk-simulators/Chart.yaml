apiVersion: v2
description: mojaloop-ttk-simulator Helm chart for Kubernetes
name: mojaloop-ttk-simulators
version: 17.2.0
appVersion: "ml-testing-toolkit: v18.19.2; ml-testing-toolkit-ui: v16.7.4; sdk-scheme-adapter: v24.19.4"
home: http://mojaloop.io
icon: http://mojaloop.io/images/logo.png
sources:
  - https://github.com/mojaloop/mojaloop
  - https://github.com/mojaloop/helm
  - https://github.com/mojaloop/sdk-scheme-adapter
maintainers:
  - name: Miguel de Barros
    email: miguel.debarros@modusbox.com
  - name: Steven Oderayi
    email: steven.oderayi@infitx.com
dependencies:
  - name: mojaloop-ttk-sim1-svc
    repository: "file://./chart-sim1"
    tags:
      - mojaloop-simulator
      - testing-toolkit
      - sdk-scheme-adapter
    version: 17.2.0
    condition: mojaloop-ttk-sim1-svc.enabled
  - name: mojaloop-ttk-sim2-svc
    repository: "file://./chart-sim2"
    tags:
      - mojaloop-simulator
      - testing-toolkit
      - sdk-scheme-adapter
    version: 17.2.0
    condition: mojaloop-ttk-sim2-svc.enabled
  - name: mojaloop-ttk-sim3-svc
    repository: "file://./chart-sim3"
    tags:
      - mojaloop-simulator
      - testing-toolkit
      - sdk-scheme-adapter
    version: 17.2.0
    condition: mojaloop-ttk-sim3-svc.enabled
  - name: e2e-sim1
    repository: "file://./e2e-sim1"
    tags:
      - sdk-scheme-adapter
    version: 17.2.0
    condition: e2e-sim1.enabled
  - name: e2e-sim2
    repository: "file://./e2e-sim2"
    tags:
      - sdk-scheme-adapter
    version: 17.2.0
    condition: e2e-sim2.enabled
  - name: e2e-sim3
    repository: "file://./e2e-sim3"
    tags:
      - sdk-scheme-adapter
    version: 17.2.0
    condition: e2e-sim3.enabled
  - name: e2e-sim-fxp1
    repository: "file://./e2e-sim-fxp1"
    tags:
      - sdk-scheme-adapter
    version: 17.2.0
    condition: e2e-sim-fxp1.enabled
  - name: e2e-sim-ttk-backend
    repository: "file://./e2e-sim-ttk-backend"
    tags:
      - testing-toolkit
    version: 17.2.0
    condition: e2e-sim-ttk-backend.enabled
