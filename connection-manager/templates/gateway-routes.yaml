{{- if and .Values.gateway.enabled .Values.gateway.host -}}
{{- $fullname := include "connection-manager.fullname" . -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullname }}
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  hostnames:
    - {{ .Values.gateway.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.gateway.oathkeeper.serviceName | quote }}
          namespace: {{ .Values.gateway.oathkeeper.serviceNamespace | quote }}
          port: {{ .Values.gateway.oathkeeper.servicePort }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $fullname }}-ui
          port: {{ .Values.ui.ports.containerPort }}
{{- end }}
