---
# Single DFSP read/update: Dfsp.view (members or hub admin via OPL inheritance)
apiVersion: oathkeeper.ory.sh/v1alpha1
kind: Rule
metadata:
  name: mcm-api-dfsp-view
  namespace: {{ .Release.Namespace }}
spec:
  match:
    url: <http|https>://{{ $fqdn }}/api/dfsps/<?!jwscerts|servercerts|states-status|endpoints><[^/]+><$>
    methods: [GET, PUT]
  authenticators:
    - handler: cookie_session
    - handler: jwt
      config:
        jwks_urls:
          - {{ $hydraJwks }}
  authorizer:
    handler: remote_json
    config:
      remote: {{ $ketoRead }}/relation-tuples/check
      payload: |
        {{ `{
          "namespace": "Dfsp",
          "object": "{{ printIndex .MatchContext.RegexpCaptureGroups 1 }}",
          "relation": "view",
          "subject_id": "{{ print .Subject }}"
        }` }}
  mutators:
    - handler: header
---
