{{/*
  These rules call Keto /permissions/check against the Hub and Dfsp
  namespaces defined in OPL by mojaloop/connection-manager-api:
  permissions/mcm.keto.ts (see that file's README for the model).
*/}}
{{- if .Values.iam.enabled -}}
{{- $fqdn := .Values.api.url | trimPrefix "https://" | trimPrefix "http://" -}}
{{- $ketoRead := .Values.global.iam.keto.readUrl -}}
{{- $hydraJwks := printf "%s/.well-known/jwks.json" .Values.global.iam.hydra.publicUrl -}}
---
# Authentication endpoints - open to authenticated users
apiVersion: oathkeeper.ory.sh/v1alpha1
kind: Rule
metadata:
  name: mcm-auth-endpoints
  namespace: {{ .Release.Namespace }}
spec:
  match:
    url: <http|https>://{{ $fqdn }}/api/auth/<.*>
    methods:
      - GET
      - POST
  authenticators:
    - handler: cookie_session
  authorizer:
    handler: allow
  mutators:
    - handler: header
---
# DFSP list - Hub.dfspList
apiVersion: oathkeeper.ory.sh/v1alpha1
kind: Rule
metadata:
  name: mcm-dfsps-list
  namespace: {{ .Release.Namespace }}
spec:
  match:
    url: <http|https>://{{ $fqdn }}/api/dfsps<$>
    methods: [GET]
  authenticators:
    - handler: cookie_session
    - handler: jwt
      config:
        jwks_urls:
          - {{ $hydraJwks }}
  authorizer:
    handler: remote_json
    config:
      remote: {{ $ketoRead }}/permissions/check
      payload: |
        {{ `{
          "namespace": "Hub",
          "object": "mojaloop",
          "relation": "dfspList",
          "subject_id": "{{ print .Subject }}"
        }` }}
  mutators:
    - handler: header
      config:
        headers:
          X-User: {{ `'{{ print .Subject }}'` }}
---
# DFSP create - Hub.dfspManage
apiVersion: oathkeeper.ory.sh/v1alpha1
kind: Rule
metadata:
  name: mcm-dfsps-create
  namespace: {{ .Release.Namespace }}
spec:
