    url: <http|https>://{{ $fqdn }}/api/dfsps<$>
    methods: [POST]
  authenticators:
    - handler: cookie_session
    - handler: jwt
      config:
        jwks_urls:
          - {{ $hydraJwks }}
  authorizer:
    handler: remote_json
    config:
      remote: {{ $ketoRead }}/permissions/check
      payload: |
        {{ `{
