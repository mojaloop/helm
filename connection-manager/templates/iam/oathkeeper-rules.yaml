---
# Single DFSP read - admin OR DFSP member (browser + PM4ML)
apiVersion: oathkeeper.ory.sh/v1alpha1
kind: Rule
metadata:
  name: mcm-dfsp-single-read
  namespace: {{ .Release.Namespace }}
spec:
  match:
    url: <http|https>://{{ $fqdn }}/api/dfsps/<?!jwscerts|servercerts><[^/]+><$>
    methods: [GET]
  authenticators:
    - handler: cookie_session
  authorizer:
    handler: remote_json
    config:
      remote: {{ $ketoBatch }}
      payload: |
        {{`{
          "tuples": [
            {
              "namespace": "permission",
              "object": "dfspManage",
              "relation": "granted",
              "subject_id": "{{ print .Subject }}"
            },
            {
              "namespace": "role",
              "object": "dfsp:{{ printIndex .MatchContext.RegexpCaptureGroups 1 }}",
              "relation": "member",
              "subject_id": "{{ print .Subject }}"
            }
          ]
        }`}}
  mutators:
    - handler: header
      config:
        headers:
          X-User: {{ `'{{ print .Subject }}'` }}
          X-DFSP-ID: {{ `'{{ printIndex .MatchContext.RegexpCaptureGroups 1 }}'` }}
