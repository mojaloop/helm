---
# Single DFSP get - Dfsp.view (admin or member)
apiVersion: oathkeeper.ory.sh/v1alpha1
kind: Rule
metadata:
  name: mcm-dfsp-single-get
  namespace: {{ .Release.Namespace }}
spec:
  match:
    url: <http|https>://{{ $fqdn }}/api/dfsps/<?!jwscerts|servercerts><[^/]+><$>
    methods: [GET, PUT]
  authenticators:
    - handler: cookie_session
  authorizer:
    handler: remote_json
    config:
      remote: {{ $ketoRead }}/permissions/check
      payload: |
        {{ `{
          "namespace": "Dfsp",
          "object": "{{ printIndex .MatchContext.RegexpCaptureGroups 1 }}",
          "relation": "view",
          "subject_id": "{{ print .Subject }}"
        }` }}
  mutators:
    - handler: header
      config:
        headers:
          X-User: {{ `'{{ print .Subject }}'` }}
          X-DFSP-ID: {{ `'{{ printIndex .MatchContext.RegexpCaptureGroups 1 }}'` }}
---
