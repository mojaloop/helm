{{- if .Values.iam.enabled -}}
{{- $fqdn := .Values.api.url | trimPrefix "https://" | trimPrefix "http://" -}}
{{- $ketoRead := .Values.global.iam.keto.readUrl -}}
{{- $ketoBatch := .Values.global.iam.keto.batchAuthUrl -}}
{{- $hydraJwks := printf "%s/.well-known/jwks.json" .Values.global.iam.hydra.publicUrl -}}
---
# Authentication endpoints - open to authenticated users
apiVersion: oathkeeper.ory.sh/v1alpha1
kind: Rule
metadata:
  name: mcm-auth-endpoints
  namespace: {{ .Release.Namespace }}
spec:
  match:
    url: <http|https>://{{ $fqdn }}/api/auth/<.*>
    methods:
      - GET
      - POST
  authenticators:
    - handler: cookie_session
  authorizer:
    handler: allow
  mutators:
    - handler: header
---
# DFSP list - dfspList permission
apiVersion: oathkeeper.ory.sh/v1alpha1
kind: Rule
metadata:
  name: mcm-dfsps-list
  namespace: {{ .Release.Namespace }}
spec:
  match:
    url: <http|https>://{{ $fqdn }}/api/dfsps<$>
    methods: [GET]
  authenticators:
    - handler: cookie_session
    - handler: jwt
      config:
        jwks_urls:
          - {{ $hydraJwks }}
  authorizer:
    handler: remote_json
    config:
      remote: {{ $ketoRead }}/relation-tuples/check
      payload: |
        {{`{
          "namespace": "permission",
          "object": "dfspList",
          "relation": "granted",
          "subject_id": "{{ print .Subject }}"
        }`}}
  mutators:
    - handler: header
      config:
        headers:
          X-User: {{ `'{{ print .Subject }}'` }}
---
# DFSP create - dfspManage permission
apiVersion: oathkeeper.ory.sh/v1alpha1
