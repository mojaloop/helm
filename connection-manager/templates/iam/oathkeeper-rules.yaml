{{/*
  These rules call Keto /relation-tuples/check against the Hub and Dfsp
  namespaces defined in OPL by mojaloop/connection-manager-api:
  permissions/mcm.keto.ts.
*/}}
{{- if .Values.iam.enabled -}}
{{- $fqdn := .Values.api.url | trimPrefix "https://" | trimPrefix "http://" -}}
{{- $ketoRead := .Values.global.iam.keto.readUrl -}}
{{- $hubObject := .Values.iam.ketoHubObject | default "mojaloop" -}}
{{- $hydraJwks := printf "%s/.well-known/jwks.json" .Values.global.iam.hydra.publicUrl -}}
---
# DFSP list: any authenticated caller; the API scopes rows by X-Roles.
apiVersion: oathkeeper.ory.sh/v1alpha1
kind: Rule
metadata:
  name: mcm-api-dfsps-list
  namespace: {{ .Release.Namespace }}
spec:
  match:
    url: <http|https>://{{ $fqdn }}/api/dfsps<$>
    methods: [GET]
  authenticators:
    - handler: cookie_session
    - handler: jwt
      config:
        jwks_urls:
          - {{ $hydraJwks }}
  authorizer:
    handler: allow
  mutators:
    - handler: header
---
# DFSP create: Hub.dfspManage
apiVersion: oathkeeper.ory.sh/v1alpha1
kind: Rule
metadata:
  name: mcm-api-dfsps-create
  namespace: {{ .Release.Namespace }}
spec:
  match:
    url: <http|https>://{{ $fqdn }}/api/dfsps<$>
    methods: [POST]
  authenticators:
    - handler: cookie_session
    - handler: jwt
      config:
        jwks_urls:
          - {{ $hydraJwks }}
  authorizer:
    handler: remote_json
    config:
      remote: {{ $ketoRead }}/relation-tuples/check
      payload: |
        {{ `{
          "namespace": "Hub",
          "object": "` }}{{ $hubObject }}{{ `",
          "relation": "dfspManage",
          "subject_id": "{{ print .Subject }}"
        }` }}
  mutators:
    - handler: header
---
