# Create Release PR
#
# Requirements:
# - GitHub Actions must be allowed to create pull requests in this repository
#   (Settings > Actions > General > Workflow permissions).
# - Secret `AUTO_RELEASE_TOKEN` (contents: write, pull-requests: write, repositories: read);
#   a classic PAT with scope `repo` works best.
#
# The pipeline is split into one job per phase, wired linearly:
#   update-charts -> changelog -> determine-version -> ttk -> finalize -> create-pr -> deploy
#
# State passed between jobs:
#   * The mutated working tree travels as a tar artifact (.git is excluded -- it is ~2GB):
#       update-charts -> worktree-charts   (chart/image version bumps)
#       ttk           -> worktree-ttk       (+ TTK test-case version in mojaloop/values.yaml)
#       finalize      -> worktree-final     (+ mojaloop/Chart.yaml version, + .changelog note)
#   * generate-changelog output (.tmp/changelogs, .tmp/tags) -> changelog-data
#   * RELEASE_VERSION -> determine-version job output
#
# `deploy` runs after `create-pr`, so a deploy failure does not affect the created PR.
# Set the `deploy` input to false to skip it.
#
# See .github/workflows/README.md for inputs, secrets, and updatecli pass details.

name: Create Release PR

on:
  workflow_dispatch:
    inputs:
      branch:
        type: string
        description: "Branch to create release PR from (e.g. main)"
        required: false
        default: "main"
      release_name:
        type: string
        description: "Release name (e.g. Acacia)"
        required: false
      release_version:
        type: string
        description: "Release version (e.g. v1.0.0)"
        required: false
      last_release_tag:
        type: string
        description: "Last release tag (e.g. v1.0.0)"
        required: false
      example_backend_version:
        type: string
        description: "Example backend version (e.g. v1.0.0)"
        required: true
        default: "v15.0.0"
      deploy:
        type: boolean
        description: "Run the deploy + TTK test job after the PR is created (best-effort)"
        required: false
        default: true
      deployment_release_name:
        type: string
        description: "Deployment release name (e.g. moja1)"
        required: true
        default: "moja2"
      deployment_namespace:
        type: string
        description: "Deployment namespace (e.g. moja1)"
        required: true
        default: "moja2"
      deployment_values_file:
        type: string
        description: "Deployment values file in oss-core-env repo"
        required: true
        default: "helm-values-moja2-mojaloop-v16.0.0.yaml"

# GITHUB_TOKEN is only used by actions/checkout. All release/PR operations use the
# AUTO_RELEASE_TOKEN PAT, so least-privilege read is sufficient.
permissions:
  contents: read

jobs:
  # Phase 1: bump every chart/image dependency version.
  update-charts:
    name: Update chart dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Update chart dependencies
        env:
          AUTO_RELEASE_TOKEN: ${{ secrets.AUTO_RELEASE_TOKEN }}
        run: .github/workflows/scripts/update-charts.sh
      - name: Pack mutated working tree
        run: |
          tar czf /tmp/worktree.tgz \
            --exclude=.git --exclude=charts --exclude='tmpcharts*' --exclude=.tmp .
      - uses: actions/upload-artifact@v4
        with:
          name: worktree-charts
          path: /tmp/worktree.tgz
          retention-days: 5

  # Phase 2: generate the cross-repo changelog (needs full history + the bumped tree).
  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    needs: [update-charts]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v4
        with:
          name: worktree-charts
          path: /tmp
      - name: Restore mutated working tree
        run: tar xzf /tmp/worktree.tgz
      - name: Generate changelog
        env:
          AUTO_RELEASE_TOKEN: ${{ secrets.AUTO_RELEASE_TOKEN }}
          LAST_RELEASE_TAG: ${{ inputs.last_release_tag }}
        run: .github/workflows/scripts/generate-changelog.sh "$LAST_RELEASE_TAG"
      - uses: actions/upload-artifact@v4
        with:
          name: changelog-data
          path: |
            .tmp/changelogs
            .tmp/tags
          retention-days: 5

  # Phase 3: derive the single RELEASE_VERSION from the changelog, and validate it.
  determine-version:
    name: Determine release version
    runs-on: ubuntu-latest
    needs: [changelog]
    outputs:
      release_version: ${{ steps.determine.outputs.RELEASE_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v4
        with:
          name: changelog-data
          path: .tmp
      - name: Determine release version number
        id: determine
        env:
          _RELEASE_VERSION: ${{ inputs.release_version }}
          LAST_RELEASE_TAG: ${{ inputs.last_release_tag }}
        run: |
          if [[ -z "$_RELEASE_VERSION" ]]; then
            release_version=$(.github/workflows/scripts/determine-release-version.sh "$LAST_RELEASE_TAG")
            echo "release_version=$release_version"
            echo "RELEASE_VERSION=$(echo $release_version)" >> "$GITHUB_OUTPUT"
          else
            echo "RELEASE_VERSION=$(echo $_RELEASE_VERSION)" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate next release version
        env:
          RELEASE_VERSION: ${{ steps.determine.outputs.RELEASE_VERSION }}
        run: |
          if [[ -z "$RELEASE_VERSION" || ! "$RELEASE_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "RELEASE_VERSION is not set or is not a valid semver version"
            exit 1
          fi

  # Phase 4: cut the TTK test-cases release, then pin its version in mojaloop/values.yaml.
  ttk:
    name: Prepare and update TTK test cases
    runs-on: ubuntu-latest
    needs: [update-charts, determine-version]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v4
        with:
          name: worktree-charts
          path: /tmp
      - name: Restore mutated working tree
        run: tar xzf /tmp/worktree.tgz
      - name: Prepare TTK test cases release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          token: ${{ secrets.AUTO_RELEASE_TOKEN }}
          repo: testing-toolkit-test-cases
          makeLatest: true
          allowUpdates: false
          generateReleaseNotes: true
          skipIfReleaseExists: true
          tag: ${{ needs.determine-version.outputs.release_version }}
          commit: master
      - name: Update TTK test cases version
        env:
          AUTO_RELEASE_TOKEN: ${{ secrets.AUTO_RELEASE_TOKEN }}
        run: updatecli apply --config .github/workflows/manifests/third-pass/mojaloop.yaml
      - name: Pack mutated working tree
        run: |
          tar czf /tmp/worktree.tgz \
            --exclude=.git --exclude=charts --exclude='tmpcharts*' --exclude=.tmp .
      - uses: actions/upload-artifact@v4
        with:
          name: worktree-ttk
          path: /tmp/worktree.tgz
          retention-days: 5

  # Phase 5: stamp the release version onto the mojaloop chart and write the release note.
  finalize:
    name: Finalize release (chart version + note)
    runs-on: ubuntu-latest
    needs: [ttk, determine-version]
    outputs:
      release_note_file: ${{ steps.note.outputs.RELEASE_NOTE_FILE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v4
        with:
          name: worktree-ttk
          path: /tmp
      - name: Restore mutated working tree
        run: tar xzf /tmp/worktree.tgz
      - uses: actions/download-artifact@v4
        with:
          name: changelog-data
          path: .tmp
      - name: Synchronize release version with mojaloop chart version
        env:
          RELEASE_VERSION: ${{ needs.determine-version.outputs.release_version }}
        run: |
          if [[ -z "$RELEASE_VERSION" || ! "$RELEASE_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "RELEASE_VERSION is not set or is not a valid semver version"
            exit 1
          fi
          release_version="${RELEASE_VERSION:1}"
          awk -v release_version="$release_version" '/^version:/ {print "version: " release_version; next} 1' mojaloop/Chart.yaml > mojaloop/Chart.yaml.tmp && mv mojaloop/Chart.yaml.tmp mojaloop/Chart.yaml
      - name: Generate release note
        id: note
        env:
          AUTO_RELEASE_TOKEN: ${{ secrets.AUTO_RELEASE_TOKEN }}
          RELEASE_NAME: ${{ inputs.release_name }}
          RELEASE_VERSION: ${{ needs.determine-version.outputs.release_version }}
          LAST_RELEASE_TAG: ${{ inputs.last_release_tag }}
          EXAMPLE_BACKEND_VERSION: ${{ inputs.example_backend_version }}
        run: |
          .github/workflows/scripts/generate-release-note.sh "$RELEASE_NAME" "$RELEASE_VERSION" "$LAST_RELEASE_TAG" "$RELEASE_VERSION" "$EXAMPLE_BACKEND_VERSION"
          echo "RELEASE_NOTE_FILE=.changelog/release-${RELEASE_VERSION}.md" >> "$GITHUB_OUTPUT"
      - name: Pack finalized working tree
        run: |
          tar czf /tmp/worktree.tgz \
            --exclude=.git --exclude=charts --exclude='tmpcharts*' --exclude=.tmp .
      - uses: actions/upload-artifact@v4
        with:
          name: worktree-final
          path: /tmp/worktree.tgz
          retention-days: 5

  # Phase 6: open the PR from the finalized tree.
  create-pr:
    name: Create pull request
    runs-on: ubuntu-latest
    needs: [finalize, determine-version]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: worktree-final
          path: /tmp
      - name: Restore finalized working tree
        run: tar xzf /tmp/worktree.tgz
      - name: Create pull request
        uses: peter-evans/create-pull-request@4e1beaa7521e8b457b572c090b25bd3db56bf1c5 # v5
        with:
          token: ${{ secrets.AUTO_RELEASE_TOKEN }}
          commit-message: "chore: upgrade helm chart depdenencies"
          title: "[auto] feat: release candidate for ${{ inputs.release_name }} ${{ needs.determine-version.outputs.release_version }}"
          body-path: ${{ needs.finalize.outputs.release_note_file }}
          branch: release/release-candidate-${{ inputs.release_name }}-${{ needs.determine-version.outputs.release_version }}-${{ github.run_id }}
          base: main
          draft: true

  # Phase 7 (best-effort): deploy the finalized charts and run the TTK tests.
  deploy:
    name: Deploy and test
    runs-on: ubuntu-latest
    needs: [create-pr, determine-version]
    if: ${{ inputs.deploy }}
    env:
      AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
      AWS_DEFAULT_OUTPUT: ${{ vars.AWS_DEFAULT_OUTPUT }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      DEPLOYMENT_NAMESPACE: ${{ inputs.deployment_namespace }}
      DEPLOYMENT_RELEASE_NAME: ${{ inputs.deployment_release_name }}
      DEPLOYMENT_VALUES_FILE: ${{ inputs.deployment_values_file }}
      RELEASE_VERSION: ${{ needs.determine-version.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v4
        with:
          name: worktree-final
          path: /tmp
      - name: Restore finalized working tree
        run: tar xzf /tmp/worktree.tgz
      - name: Clone oss-core-env repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AUTO_RELEASE_TOKEN }}
          repository: mojaloop/oss-core-env
          ref: main
          path: .tmp/oss-core-env
      - name: Prepare deployment values file
        run: |
          set -a && . .tmp/oss-core-env/config/test-mojaloop-live/.env && set +a
          values_file=".tmp/oss-core-env/config/test-mojaloop-live/$DEPLOYMENT_VALUES_FILE"
          sed -i "s/{{CI_ENV_NAME}}/$ENV_NAME/" "$values_file"
          sed -i "s/{{CI_HELM_NAMESPACE}}/$DEPLOYMENT_NAMESPACE/" "$values_file"
          sed -i "s/{{CI_ENV_VERSION}}/$RELEASE_VERSION/" "$values_file"
      - name: Set KUBECONFIG
        run: |
          echo "${{ secrets.AUTO_RELEASE_KUBECONFIG }}" > .tmp/test.mojaloop.live.conf
          chmod 600 .tmp/test.mojaloop.live.conf
      - name: Cluster Info
        env:
          KUBECONFIG: .tmp/test.mojaloop.live.conf
        run: kubectl cluster-info
      - name: Delete existing deployments
        env:
          KUBECONFIG: .tmp/test.mojaloop.live.conf
        run: helm ls -n "$DEPLOYMENT_NAMESPACE" --short | xargs -L1 sh -c 'if [ -n "$1" ]; then helm uninstall -n "$DEPLOYMENT_NAMESPACE" "$1"; fi' _
      - name: Deploy backend
        env:
          KUBECONFIG: .tmp/test.mojaloop.live.conf
        run: helm install backend mojaloop/example-mojaloop-backend --namespace "$DEPLOYMENT_NAMESPACE"
      - name: Build charts
        run: ./update-charts-dep.sh
      - name: Deploy charts
        env:
          KUBECONFIG: .tmp/test.mojaloop.live.conf
        run: |
          helm install "$DEPLOYMENT_RELEASE_NAME" ./mojaloop -f ".tmp/oss-core-env/config/test-mojaloop-live/$DEPLOYMENT_VALUES_FILE" --namespace "$DEPLOYMENT_NAMESPACE"
      - name: Wait for deployment to be ready
        env:
          KUBECONFIG: .tmp/test.mojaloop.live.conf
        timeout-minutes: 15
        continue-on-error: true
        run: |
          while [[ $(kubectl get pods -n "$DEPLOYMENT_NAMESPACE" -o 'jsonpath={..status.conditions[?(@.type=="Ready")].status}' | grep False) ]]; do
            echo "Waiting for pods to be ready..."
            sleep 10
          done
          echo "All pods are ready!"
      - name: Run TTK tests
        env:
          KUBECONFIG: .tmp/test.mojaloop.live.conf
        timeout-minutes: 15
        continue-on-error: true
        run: helm test "$DEPLOYMENT_RELEASE_NAME" --namespace "$DEPLOYMENT_NAMESPACE"
      - name: Clean up
        if: ${{ always() }}
        run: rm -rf .tmp
