name: "Setup release tooling"
description: >
  Install Helm, mo, updatecli and jq, and add the Mojaloop Helm repositories.
  Reused by every job in the release-PR workflow so the toolchain is defined once
  (a standalone "setup" job cannot work: each GitHub Actions job runs on a fresh
  runner, so installed tools do not carry over).

runs:
  using: composite
  steps:
    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: v3.13.3

    - name: Install CLI dependencies (mo, updatecli, jq)
      shell: bash
      run: |
        set -euo pipefail
        # mo (mustache templating)
        curl -sSL https://raw.githubusercontent.com/tests-always-included/mo/master/mo -o /tmp/mo
        sudo install -m 0755 /tmp/mo /usr/local/bin/mo
        mo --help >/dev/null
        # updatecli
        curl -sL https://github.com/updatecli/updatecli/releases/download/v0.71.0/updatecli_amd64.deb -o /tmp/updatecli_amd64.deb
        sudo apt-get install -y /tmp/updatecli_amd64.deb
        # jq
        sudo apt-get install -y jq

    - name: Setup Helm repositories
      shell: bash
      run: |
        helm repo add stable https://charts.helm.sh/stable
        helm repo add incubator https://charts.helm.sh/incubator
        helm repo add kokuwa https://kokuwaio.github.io/helm-charts
        helm repo add elastic https://helm.elastic.co
        helm repo add codecentric https://codecentric.github.io/helm-charts
        helm repo add bitnami https://charts.bitnami.com/bitnami
        helm repo add mojaloop-charts https://mojaloop.github.io/charts/repo
        helm repo add redpanda https://charts.redpanda.com
        helm repo add mojaloop https://mojaloop.io/helm/repo/
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo add ory https://k8s.ory.sh/helm/charts
        helm repo update
