# Example deployment configuration.
# Copy this file and customize for your environment.
# Apply with: helmfile -f helmfile.yaml.gotmpl --state-values-file my-deployment.yaml apply

## Namespace overrides (optional, defaults in namespaces.yaml)
# namespaces:
#   iam: mojaloop-iam
#   core: mojaloop-core
#   settlement: mojaloop-settlement
#   mcm: mojaloop-mcm
#   db: mojaloop-db
#   test: mojaloop-test
#   sims: mojaloop-sims

## Infrastructure endpoints (override if using external services)
# kafka:
#   host: my-kafka-cluster
#   port: 9092

# mysql:
#   host: my-rds-instance.amazonaws.com
#   port: 3306
#   secret:
#     name: my-mysql-secret
#     key: password

## Hub config
# hub:
#   id: 1
#   name: MyHub

## Feature flags
# features:
#   interschemeEnabled: true
#   batchSize: 200
